<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digipets — Juego</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 
    /* Esto carga todo el framework */

    /* Variables de configuración */
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }

    /* layer base: estilos globales y "reseteo" de etiquetas HTML puras */
    /* Permite definir cómo se ve la web "por defecto" antes de empezar a poner clases. */

    @layer base {
      body {
        @apply min-h-screen bg-slate-950 bg-cover bg-center bg-no-repeat text-white;
        background-image: url("assets/img/bg tamagoshi.jpeg");
      }

      p {
        @apply mb-4 leading-relaxed text-white;
      }

      h1, h2, h3 {
        @apply font-serif font-bold text-white mb-6;
      }
    }

    /* @layer components: Se usa para crear clases complejas reutilizables */
    /* Se usa cuando se está repitiendo EXACTAMENTE las mismas 10 clases en muchos componentes (por ejemplo botones), para crear una clase propia. */

    @layer components {
      .btn {
        @apply inline-flex cursor-pointer items-center justify-center rounded-lg border-4 border-double border-white font-semibold shadow transition-colors outline-none;
      }

      .btn-xs {
        @apply min-h-8 px-2 py-1 text-xs;
      }

      @media (min-width: 640px) {
        .sm\:btn-sm {
          @apply min-h-9 px-3 py-1.5 text-sm;
        }
      }

      @media (min-width: 768px) {
        .md\:btn-md {
          @apply min-h-10 px-4 py-2 text-base;
        }
      }

      @media (min-width: 1024px) {
        .lg\:btn-lg {
          @apply min-h-11 px-5 py-2.5 text-lg;
        }
      }

      @media (min-width: 1280px) {
        .xl\:btn-xl {
          @apply min-h-12 px-6 py-3 text-xl;
        }
      }

      .panel-juego {
        @apply rounded-xl bg-slate-800/70 p-4 md:p-5;
      }

      .resumen-juego {
        @apply mb-3 inline-flex cursor-pointer list-none rounded-lg border-4 border-double border-white bg-orange-500 px-4 py-2 text-sm font-bold text-white hover:bg-orange-600;
      }

      .resumen-juego::-webkit-details-marker {
        display: none;
      }

      .avatar {
        @apply w-36 overflow-hidden rounded-full sm:w-40;
      }

      .avatar--muerto {
        @apply opacity-50 grayscale;
      }

      .avatar img {
        @apply h-full w-full object-cover;
      }

      .contenedor-juego {
        @apply mx-auto w-full max-w-2xl;
      }

      .panel-columna {
        @apply flex flex-col gap-2 rounded-xl border border-slate-600 bg-slate-900/60 p-2 md:p-3;
      }

      .video-personaje {
        @apply aspect-[3/4] w-full rounded-lg border border-slate-600 bg-black object-cover shadow-lg;
      }

      .barra-estado {
        @apply flex flex-col gap-0.5;
      }

      .fila-estado {
        @apply flex flex-row items-center gap-2;
      }

      .fila-estado > span {
        @apply w-[4.5rem] shrink-0 text-xs font-semibold leading-none;
      }

      .iconos-estado {
        @apply flex flex-nowrap gap-0.5;
      }

      .btn-naranja {
        @apply bg-orange-500 font-bold text-white hover:bg-orange-600;
      }

      .select-personaje {
        @apply w-full rounded-lg border border-slate-500 bg-slate-900 px-3 py-3 text-center text-base font-semibold text-white sm:text-lg;
      }

      .icono-stat {
        @apply h-4 w-4 transition-all duration-300 sm:h-5 sm:w-5;
      }

      .icono-stat--activo {
        @apply opacity-100 brightness-110 grayscale-0;
      }

      .icono-stat--apagado {
        @apply opacity-30 brightness-50 grayscale;
      }

      .barra-acciones {
        @apply fixed inset-x-0 bottom-0 z-50 flex flex-wrap justify-center gap-2 border-t border-slate-600/80 bg-slate-900/95 px-3 py-3 shadow-[0_-4px_24px_rgba(0,0,0,0.45)] backdrop-blur-sm;
      }

      main:has(#barra-acciones:not(.hidden)) {
        @apply pb-32;
      }

      .pie-proyecto {
        @apply rounded-xl border border-slate-600/60 bg-slate-900/70 px-4 py-3 text-center text-sm shadow-lg backdrop-blur-sm;
      }

      .contenedor-volver {
        @apply mt-auto flex justify-end pb-2;
      }

      .btn-volver {
        @apply inline-flex min-h-7 items-center justify-center rounded-md border-2 border-double border-white bg-orange-500 px-2 py-0.5 text-[0.65rem] font-semibold text-white no-underline shadow hover:bg-orange-600 sm:text-xs;
      }

      .dialogo-game-over {
        @apply max-w-sm rounded-xl border border-sky-500/40 bg-slate-800/95 p-4 text-white shadow-xl;
      }

      .zona-fin-partida {
        @apply rounded-lg border border-slate-600 bg-blue-950/80 p-3;
      }

      .dialogo-game-over::backdrop {
        background: rgb(0 0 0 / 0.6);
      }
    }

  </style>

  <script defer src="./js/clase-tamagotchi.js"></script>
  <script defer src="./js/datos-tamagotchi.js"></script>
  <script defer src="./js/app.js"></script>

</head>

<body>
    <main class="mx-auto flex min-h-screen max-w-7xl flex-col gap-3 p-4 md:p-6">

      <details id="detalle-seleccion-fase" class="w-full">
        <summary class="resumen-juego">🐾 ¿Listo para adoptar a tu Digipet? Pulsa aquí</summary>

        <div class="mt-3">
        <aside id="panel-seleccion" class="panel-juego mx-auto flex w-full max-w-lg flex-col gap-4">
          <p class="mb-0 text-center text-sm font-semibold">
            Selecciona el Tamagotchi con el cual quieres jugar
          </p>

          <div class="flex flex-col gap-3">
            <label for="seleccionar" class="sr-only">
              Selecciona el Tamagotchi con el cual quieres jugar
            </label>
            <select
              id="seleccionar"
              class="select-personaje"
            ></select>

            <button
              id="continuar"
              type="button"
              class="btn btn-xs btn-naranja sm:btn-sm mx-auto"
            >
              Continuar juego
            </button>
          </div>
        </aside>
        </div>
      </details>

      <section
        id="juego-activo"
        class="panel-juego hidden flex flex-col gap-4"
      >
        <div class="contenedor-juego grid grid-cols-1 gap-3 md:grid-cols-2 md:items-start">
          <div id="zona-partida" class="panel-columna">
            <div class="flex flex-col items-center gap-2 text-center">
              <h2 id="nombre-elegido" class="mb-0 text-lg font-bold text-sky-400"></h2>
              <img
                id="imagen-elegida"
                class="avatar w-28 border-2 border-slate-500 sm:w-32"
                src=""
                alt=""
              >
              <p id="descripcion-elegida" class="mb-0 text-xs leading-relaxed text-slate-200 sm:text-sm"></p>
            </div>

            <div id="barra-estado" class="barra-estado border-t border-slate-600/50 pt-2">
              <div class="fila-estado">
                <span>Felicidad</span>
                <div id="iconos-felicidad" class="iconos-estado" aria-label="Felicidad"></div>
              </div>
              <div class="fila-estado">
                <span>Salud</span>
                <div id="iconos-salud" class="iconos-estado" aria-label="Salud"></div>
              </div>
              <div class="fila-estado">
                <span>Limpieza</span>
                <div id="iconos-limpieza" class="iconos-estado" aria-label="Limpieza"></div>
              </div>
              <div class="fila-estado">
                <span>Energía</span>
                <div id="iconos-energia" class="iconos-estado" aria-label="Energía"></div>
              </div>
            </div>

            <dialog id="dialogo-game-over" class="dialogo-game-over">
              <p id="texto-game-over" class="mb-4 text-center text-base leading-relaxed"></p>
              <button
                id="cerrar-game-over"
                type="button"
                class="btn btn-xs sm:btn-sm w-full border-red-300 bg-red-800 font-bold text-white hover:bg-red-700"
              >
                OK
              </button>
            </dialog>

            <div id="opciones-fin" class="zona-fin-partida hidden flex flex-col gap-2">
              <p class="mb-0 text-center text-xs font-semibold text-white">¿Qué quieres hacer ahora?</p>
              <button
                id="seguir-jugando"
                type="button"
                class="btn btn-xs btn-naranja sm:btn-sm"
              >
                Seguir jugando con el mismo personaje
              </button>
              <button
                id="otro-jugador"
                type="button"
                class="btn btn-xs btn-naranja sm:btn-sm"
              >
                Cambiar de personaje
              </button>
            </div>
          </div>

          <div class="panel-columna">
            <video
              id="video-personaje"
              class="video-personaje"
              controls
              playsinline
              autoplay
            ></video>
          </div>
        </div>
      </section>

      <div class="contenedor-volver">
        <a
          href="index.html"
          class="btn-volver"
        >
          Volver a la página principal
        </a>
      </div>
  
      <footer class="pie-proyecto">
        <p class="mb-0">
          <span class="text-white/90">Proyecto Tamagotchi</span>
          <span class="mx-1.5 text-white/35">—</span>
          <span class="font-semibold text-sky-400">Digipets</span>
        </p>
      </footer>
    </main>

    <nav id="barra-acciones" class="barra-acciones hidden" aria-label="Acciones del tamagotchi">
      <button type="button" id="btn-alimentar" class="btn btn-xs sm:btn-sm bg-blue-900 text-white hover:bg-blue-800">
        Alimentar
      </button>
      <button type="button" id="btn-jugar" class="btn btn-xs sm:btn-sm bg-blue-900 text-white hover:bg-blue-800">
        Jugar
      </button>
      <button type="button" id="btn-duchar" class="btn btn-xs sm:btn-sm bg-blue-900 text-white hover:bg-blue-800">
        Duchar
      </button>
      <button type="button" id="btn-acariciar" class="btn btn-xs sm:btn-sm bg-blue-900 text-white hover:bg-blue-800">
        Acariciar
      </button>
      <button type="button" id="btn-dormir" class="btn btn-xs sm:btn-sm bg-blue-900 text-white hover:bg-blue-800">
        Dormir
      </button>
      <button type="button" id="btn-reprender" class="btn btn-xs sm:btn-sm bg-red-800 text-white hover:bg-red-700">
        Reprender
      </button>
    </nav>

  </body>

</html>
